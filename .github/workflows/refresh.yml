name: Refresh finance dashboard

on:
  schedule:
    - cron: '23 13 * * *'   # ~daily, off a round hour so it doesn't queue behind everyone else's 00:00/12:00 jobs
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Sync finance data
        run: python sync_finance_dashboard.py
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          EXPENSE_SHEET_ID: ${{ secrets.EXPENSE_SHEET_ID }}

      - name: Generate dashboard
        run: python generate_dashboard.py docs/index.html
        env:
          GATE_PASSWORD: ${{ secrets.GATE_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
